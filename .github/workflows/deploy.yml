name: Deploy to Netlify

on:
  push:
    branches: [main]
    # Site statique : un push qui ne touche QUE de la doc/config CI ne sert pas
    # le site déployé → pas de deploy (économie budget Netlify). Un push qui
    # touche index.html / netlify.toml / assets déploie normalement.
    paths-ignore:
      - '**.md'
      - '.github/**'
      - '.gitignore'
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      # Le site reste un index.html statique (aucun build de la page). MAIS depuis
      # l'ajout du collecteur d'events (netlify/functions/track-site-event.js), le
      # bundle esbuild de la Function doit résoudre @netlify/blobs → il faut les
      # deps installées. @netlify/blobs est en dependencies (pas devDeps), donc
      # --omit=dev l'installe. Sans ce step, le deploy échoue sur
      # « Could not resolve "@netlify/blobs" ».
      - name: Install deps (functions)
        run: npm ci --omit=dev

      - name: Deploy to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          MSG=$(git log -1 --pretty=%s)
          npx --yes netlify-cli@latest deploy --prod --dir=. --functions=netlify/functions --message="${MSG} (${COMMIT_SHA:0:7})"
